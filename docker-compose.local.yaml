services:
  catalog-db:
    image: postgres:16
    container_name: catalog_db_postgres
    environment:
      POSTGRES_DB: Db.Catalog
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - catalog_pg_data:/var/lib/postgresql/data
    networks:
      - microsservicos-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Db.Catalog" ]
      interval: 10s
      timeout: 5s
      retries: 10

  catalog-api:
    depends_on:
      catalog-db:
        condition: service_healthy
    
volumes:
  catalog_pg_data:

networks:
  microsservicos-net:
    name: app-network
    driver: bridge