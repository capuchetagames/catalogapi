apiVersion: v1
kind: Pod
metadata:
  name: catalog-api
  labels:
    app: catalog-api
spec:
  initContainers:
    - name: wait-for-catalog-db
      image: mcr.microsoft.com/mssql-tools:latest
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: catalog-secret
              key: DB_PASSWORD
      command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for SQL Server..."
          until /opt/mssql-tools/bin/sqlcmd \
            -S catalog-db,1436 \
            -U sa \
            -P "$DB_PASSWORD" \
            -Q "SELECT 1" \
            -C > /dev/null 2>&1
          do
            sleep 5
          done
  containers:
    - name: catalog-api
      image: catalog-api:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      env:
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: catalog-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: catalog-config
              key: DB_NAME
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: catalog-config
              key: ASPNETCORE_ENVIRONMENT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: catalog-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: catalog-secret
              key: DB_PASSWORD
